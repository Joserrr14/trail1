<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Envelope Animation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="envelope">

    <div class="flap"></div>

    <div class="body">
      <img src="assets/image1.jpg" alt="Envelope Cover">
    </div>

    <div class="letter">
      <img src="assets/image2.jpg" alt="Letter Content">
    </div>

  </div>

  <!-- Background Music -->
  <audio id="bgMusic" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>

</body>
</html>
