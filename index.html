<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Envelope Invitation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Envelope container -->
<div id="envelope" class="envelope">

  <!-- Flap (top part of same image) -->
  <div class="flap"></div>

  <!-- Envelope body -->
  <div class="body"></div>

  <!-- Letter -->
  <div class="letter">
    <img src="assets/image2.jpg" alt="Save the Date">
  </div>

  <!-- Optional blur behind letter -->
  <div class="blur-bg"></div>

</div>

<!-- Background music -->
<audio id="bgMusic" src="assets/music.mp3" loop></audio>

<!-- Script -->
<script src="script.js"></script>

</body>
</html>
